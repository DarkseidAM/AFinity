name: Release APK

# Builds signed release APKs and attaches them to a draft GitHub release.
# Trigger: pushing a version tag (e.g. v0.7.6-beta). Publishing the draft release
# then fires the existing Discord release notification workflow.
#
# Required repository secrets:
#   KEYSTORE_BASE64   - base64 of the signing keystore (.jks)
#   KEYSTORE_PASSWORD - the keystore store password (also used as the key password)
# The key alias is "key".

on:
  push:
    tags:
      - 'v0.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      # AFinity has native code (libdovi_bridge via CMake/NDK) that the runner must
      # be able to build. Provision the exact toolchain the project pins.
      - name: Install NDK and CMake
        run: |
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager" \
            "ndk;28.0.13004108" "cmake;3.22.1"

      - name: Decode signing keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "${GITHUB_WORKSPACE}/keystore.jks"

      - name: Build signed release APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="${GITHUB_WORKSPACE}/keystore.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias=key \
            -Pandroid.injected.signing.key.password="${{ secrets.KEYSTORE_PASSWORD }}"

      - name: Attach APKs to draft release
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
          draft: true
          prerelease: true
          generate_release_notes: true

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk
